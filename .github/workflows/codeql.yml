# ================================
# CodeQL Security Scanning Workflow
# ================================
# This workflow runs GitHub's CodeQL analysis to find security vulnerabilities.
# It demonstrates: scheduled triggers, security scanning, SARIF uploads.

name: CodeQL Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'              # Runs every Monday at 9:00 AM UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write          # Required to upload SARIF results

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]   # CodeQL supports: cpp, csharp, go, java-kotlin, javascript-typescript, python, ruby, swift

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Initialize CodeQL for the specified language
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Build the project (CodeQL needs compiled code for Java)
      - name: Build with Maven
        run: mvn compile --batch-mode --no-transfer-progress

      # Run the CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
