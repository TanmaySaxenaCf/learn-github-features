# ============================================================
# RE/FE Pipeline — PR Validation Workflow
# ============================================================
# Runs on PRs created by the RE/FE pipeline to validate
# phase-specific artifacts:
# - Phase 1: RE docs 1-5 exist and are non-empty
# - Phase 2: RE docs 6-10 exist and are non-empty
# - Phase 3: Forward-engineered code exists, project compiles
# - Phase 4: Tests exist and pass

name: "RE/FE Pipeline — PR Validation"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  validate:
    name: Validate Phase Artifacts
    runs-on: ubuntu-latest

    # Only run on RE/FE pipeline PRs
    if: startsWith(github.head_ref, 're-fe/')

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect phase from branch
        id: detect
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ -phase([0-9]+)- ]]; then
            echo "phase=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "phase=0" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected phase: ${BASH_REMATCH[1]:-unknown}"

      - name: Set up JDK 21
        if: steps.detect.outputs.phase == '3' || steps.detect.outputs.phase == '4'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ── Phase 1: Validate RE docs 1-5 ──
      - name: Validate RE docs 1-5
        if: steps.detect.outputs.phase == '1'
        id: check-phase1
        run: |
          echo "## Phase 1 — RE Docs 1-5 Validation" >> "$GITHUB_STEP_SUMMARY"

          DOCS=("01-discovery-report" "02-component-catalog" "03-sequence-diagrams" "04-business-rules-catalog" "05-data-dictionary")
          FOUND=0
          MISSING=0

          echo "| Status | Document | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|---------|" >> "$GITHUB_STEP_SUMMARY"

          for doc in "${DOCS[@]}"; do
            FILE=$(find re-docs -name "${doc}.md" 2>/dev/null | head -1)
            if [ -n "$FILE" ] && [ -s "$FILE" ]; then
              LINES=$(wc -l < "$FILE")
              echo "| ✅ | ${doc}.md | ${LINES} lines |" >> "$GITHUB_STEP_SUMMARY"
              FOUND=$((FOUND + 1))
            else
              echo "| ❌ | ${doc}.md | Missing or empty |" >> "$GITHUB_STEP_SUMMARY"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      # ── Phase 2: Validate RE docs 6-10 ──
      - name: Validate RE docs 6-10
        if: steps.detect.outputs.phase == '2'
        id: check-phase2
        run: |
          echo "## Phase 2 — RE Docs 6-10 Validation" >> "$GITHUB_STEP_SUMMARY"

          DOCS=("06-data-flow-diagram" "07-bdd-feature-specs" "08-test-case-inventory" "09-gap-report" "10-field-to-field-mapping")
          FOUND=0
          MISSING=0

          echo "| Status | Document | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|---------|" >> "$GITHUB_STEP_SUMMARY"

          for doc in "${DOCS[@]}"; do
            FILE=$(find re-docs -name "${doc}.md" 2>/dev/null | head -1)
            if [ -n "$FILE" ] && [ -s "$FILE" ]; then
              LINES=$(wc -l < "$FILE")
              echo "| ✅ | ${doc}.md | ${LINES} lines |" >> "$GITHUB_STEP_SUMMARY"
              FOUND=$((FOUND + 1))
            else
              echo "| ❌ | ${doc}.md | Missing or empty |" >> "$GITHUB_STEP_SUMMARY"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      # ── Phase 3: Validate forward-engineered code ──
      - name: Validate FE code
        if: steps.detect.outputs.phase == '3'
        id: check-phase3
        run: |
          echo "## Phase 3 — Forward Engineering Validation" >> "$GITHUB_STEP_SUMMARY"

          if [ -d "forward-engineered" ]; then
            FE_COUNT=$(find forward-engineered -name "*.java" | wc -l)
            REPORT=$(find forward-engineered -name "MIGRATION_COMPARISON_REPORT.md" | head -1)
            echo "✅ Found $FE_COUNT forward-engineered Java files" >> "$GITHUB_STEP_SUMMARY"
            echo "fe_count=$FE_COUNT" >> "$GITHUB_OUTPUT"

            if [ -n "$REPORT" ]; then
              echo "✅ Migration comparison report found" >> "$GITHUB_STEP_SUMMARY"
              echo "has_report=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ Migration comparison report missing" >> "$GITHUB_STEP_SUMMARY"
              echo "has_report=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ No forward-engineered/ directory found" >> "$GITHUB_STEP_SUMMARY"
            echo "fe_count=0" >> "$GITHUB_OUTPUT"
            echo "has_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build project (Phase 3)
        if: steps.detect.outputs.phase == '3'
        id: build
        run: |
          if mvn compile --batch-mode --no-transfer-progress 2>&1; then
            echo "✅ Build successful" >> "$GITHUB_STEP_SUMMARY"
            echo "build_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Build failed" >> "$GITHUB_STEP_SUMMARY"
            echo "build_status=failure" >> "$GITHUB_OUTPUT"
          fi

      # ── Phase 4: Validate tests ──
      - name: Validate test files
        if: steps.detect.outputs.phase == '4'
        id: check-phase4
        run: |
          echo "## Phase 4 — Test Validation" >> "$GITHUB_STEP_SUMMARY"

          CONTRACT=$(find src/test -name "*ContractTest.java" 2>/dev/null | wc -l)
          AUTOTEST=$(find src/test -path "*/autotest/*.java" 2>/dev/null | wc -l)
          BEHAVIORAL=$(find src/test -path "*/behavioral/*.java" 2>/dev/null | wc -l)
          TOTAL=$((CONTRACT + AUTOTEST + BEHAVIORAL))

          echo "| Category | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract tests | $CONTRACT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| testgen unit tests | $AUTOTEST |" >> "$GITHUB_STEP_SUMMARY"
          echo "| testgen behavioral tests | $BEHAVIORAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total new tests** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

          echo "contract=$CONTRACT" >> "$GITHUB_OUTPUT"
          echo "autotest=$AUTOTEST" >> "$GITHUB_OUTPUT"
          echo "behavioral=$BEHAVIORAL" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Run tests (Phase 4)
        if: steps.detect.outputs.phase == '4'
        id: test
        run: |
          if mvn test --batch-mode --no-transfer-progress --fail-at-end 2>&1; then
            echo "✅ All tests passed" >> "$GITHUB_STEP_SUMMARY"
            echo "test_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Some tests failed" >> "$GITHUB_STEP_SUMMARY"
            echo "test_status=failure" >> "$GITHUB_OUTPUT"
          fi

      # ── Post validation summary as PR comment ──
      - name: Post validation summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ steps.detect.outputs.phase }}';
            const icon = (ok) => ok ? '✅' : '❌';
            let body = '';

            if (phase === '1') {
              const found = '${{ steps.check-phase1.outputs.found }}' || '0';
              const missing = '${{ steps.check-phase1.outputs.missing }}' || '0';
              const pass = missing === '0';
              body = `## ${icon(pass)} Phase 1 — RE Docs 1-5 Validation\n\n` +
                `| Check | Status |\n|-------|--------|\n` +
                `| RE Documents 1-5 | ${icon(pass)} ${found}/5 found, ${missing} missing |\n\n` +
                (pass ? '### ✅ All Phase 1 documents present — ready for review.' : '### ❌ Some documents missing — review above.');

            } else if (phase === '2') {
              const found = '${{ steps.check-phase2.outputs.found }}' || '0';
              const missing = '${{ steps.check-phase2.outputs.missing }}' || '0';
              const pass = missing === '0';
              body = `## ${icon(pass)} Phase 2 — RE Docs 6-10 Validation\n\n` +
                `| Check | Status |\n|-------|--------|\n` +
                `| RE Documents 6-10 | ${icon(pass)} ${found}/5 found, ${missing} missing |\n\n` +
                (pass ? '### ✅ All Phase 2 documents present — ready for review.' : '### ❌ Some documents missing — review above.');

            } else if (phase === '3') {
              const feCount = '${{ steps.check-phase3.outputs.fe_count }}' || '0';
              const hasReport = '${{ steps.check-phase3.outputs.has_report }}' === 'true';
              const buildOk = '${{ steps.build.outputs.build_status }}' === 'success';
              const pass = feCount !== '0' && buildOk;
              body = `## ${icon(pass)} Phase 3 — Forward Engineering Validation\n\n` +
                `| Check | Status |\n|-------|--------|\n` +
                `| FE Java files | ${icon(feCount !== '0')} ${feCount} files |\n` +
                `| Migration Report | ${icon(hasReport)} ${hasReport ? 'Present' : 'Missing'} |\n` +
                `| Build | ${icon(buildOk)} ${buildOk ? 'Success' : 'Failed'} |\n\n` +
                (pass ? '### ✅ Forward engineering validated — ready for review.' : '### ❌ Some checks failed — review above.');

            } else if (phase === '4') {
              const total = '${{ steps.check-phase4.outputs.total }}' || '0';
              const testOk = '${{ steps.test.outputs.test_status }}' === 'success';
              const pass = total !== '0' && testOk;
              body = `## ${icon(pass)} Phase 4 — Testing Validation\n\n` +
                `| Check | Status |\n|-------|--------|\n` +
                `| Contract tests | ${{ steps.check-phase4.outputs.contract }} |\n` +
                `| testgen unit tests | ${{ steps.check-phase4.outputs.autotest }} |\n` +
                `| Behavioral tests | ${{ steps.check-phase4.outputs.behavioral }} |\n` +
                `| Total new tests | ${total} |\n` +
                `| Test execution | ${icon(testOk)} ${testOk ? 'All passed' : 'Some failed'} |\n\n` +
                (pass ? '### ✅ All tests present and passing — ready for review.' : '### ❌ Some checks failed — review above.');

            } else {
              body = '## ℹ️ RE/FE Pipeline PR — no specific phase detected from branch name.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
