# ============================================================
# RE/FE Pipeline — Orchestration Workflow
# ============================================================
# Triggered when an issue is opened/labeled with "re-fe-pipeline".
# Parses the issue body, validates the source folder, then creates
# a focused Phase 1 child issue and assigns Copilot to it.
# Subsequent phases are chained via re-fe-chain.yml.

name: "RE/FE Pipeline — Orchestrator"

on:
  issues:
    types: [opened, labeled]

jobs:
  orchestrate:
    name: Parse Issue & Launch Phase 1
    runs-on: ubuntu-latest

    if: |
      contains(github.event.issue.labels.*.name, 're-fe-pipeline') &&
      !contains(github.event.issue.labels.*.name, 'pipeline-running')

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse, validate, and create Phase 1 issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';
            const parentIssue = context.issue.number;

            // ── Parse inputs from issue body ──
            const folderMatch = body.match(/### Source Folder Path\s*\n\s*(.+)/);
            const serviceMatch = body.match(/### Service Name\s*\n\s*(.+)/);
            const typeMatch = body.match(/### Service Type\s*\n\s*(.+)/);
            const contextMatch = body.match(/### Additional Context\s*\n\s*([\s\S]*?)(?=\n### |$)/);

            const reChecked = /\[X\].*Reverse Engineering/i.test(body);
            const feChecked = /\[X\].*Forward Engineering/i.test(body);
            const testChecked = /\[X\].*Testing/i.test(body);

            const sourceFolder = folderMatch ? folderMatch[1].trim() : '';
            const serviceName = serviceMatch ? serviceMatch[1].trim() : '';
            const serviceType = typeMatch ? typeMatch[1].trim() : '';
            const additionalContext = contextMatch ? contextMatch[1].trim() : 'None';

            if (!sourceFolder || !serviceName) {
              core.setFailed('Could not parse source folder or service name from issue body');
              return;
            }

            // ── Validate folder exists ──
            if (!fs.existsSync(sourceFolder)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentIssue,
                body: '## ❌ Pipeline Error\n\nSource folder `' + sourceFolder + '` does not exist in this repository.\nClose this issue and create a new one with a valid path.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentIssue,
                labels: ['invalid']
              });
              return;
            }

            // ── Determine stages ──
            const stages = [];
            if (reChecked) stages.push('RE');
            if (feChecked) stages.push('FE');
            if (testChecked) stages.push('TESTING');

            console.log('Service:', serviceName, '| Folder:', sourceFolder, '| Stages:', stages.join(','));

            // ── Build Phase 1 issue body ──
            const phase1Body = [
              '<!-- PIPELINE_META',
              'parent_issue: ' + parentIssue,
              'service_name: ' + serviceName,
              'source_folder: ' + sourceFolder,
              'service_type: ' + serviceType,
              'stages: ' + stages.join(','),
              '-->',
              '',
              '## Phase 1: Reverse Engineering — Documents 1-5',
              '',
              '**Parent Issue**: #' + parentIssue,
              '**Service**: ' + serviceName + ' (' + serviceType + ')',
              '**Source Folder**: `' + sourceFolder + '`',
              '**Context**: ' + additionalContext,
              '',
              '---',
              '',
              '### Instructions',
              '',
              'Read `.github/copilot-phase-instructions/phase1-re-docs-1-5.md` for detailed rules.',
              '',
              '### Task',
              '',
              'Analyze all source files in `' + sourceFolder + '` and generate **5 RE documents**:',
              '',
              '| # | Read Template | Generate Output |',
              '|---|--------------|-----------------|',
              '| 1 | `.github/re-templates/01-DISCOVERY-REPORT-TEMPLATE.md` | `re-docs/' + serviceName + '/01-discovery-report.md` |',
              '| 2 | `.github/re-templates/02-COMPONENT-CATALOG-TEMPLATE.md` | `re-docs/' + serviceName + '/02-component-catalog.md` |',
              '| 3 | `.github/re-templates/03-SEQUENCE-DIAGRAMS-TEMPLATE.md` | `re-docs/' + serviceName + '/03-sequence-diagrams.md` |',
              '| 4 | `.github/re-templates/04-BUSINESS-RULES-CATALOG-TEMPLATE.md` | `re-docs/' + serviceName + '/04-business-rules-catalog.md` |',
              '| 5 | `.github/re-templates/05-DATA-DICTIONARY-TEMPLATE.md` | `re-docs/' + serviceName + '/05-data-dictionary.md` |',
              '',
              '### Output',
              '',
              '- **Branch**: `re-fe/' + serviceName + '-phase1-' + parentIssue + '`',
              '- **PR Title**: `[RE/FE Phase 1] ' + serviceName + ' — RE Docs 1-5 (#' + parentIssue + ')`',
              '- **PR Labels**: `re-fe-pipeline`, `re-fe-phase1`',
              '- **PR Body**: Include `Closes #ISSUE_NUMBER` (replace ISSUE_NUMBER with this issue\'s number)',
            ].join('\n');

            // ── Create Phase 1 issue ──
            const phase1 = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[RE/FE Phase 1] ' + serviceName + ' — RE Docs 1-5 (parent #' + parentIssue + ')',
              body: phase1Body,
              labels: ['re-fe-pipeline', 're-fe-phase1'],
              assignees: ['copilot']
            });

            console.log('Created Phase 1 issue #' + phase1.data.number);

            // ── Determine total phases ──
            let phaseRows = '| 1 | RE Docs 1-5 | #' + phase1.data.number + ' | 🔄 In Progress |\n';
            phaseRows += '| 2 | RE Docs 6-10 | _After Phase 1_ | ⏳ Pending |\n';
            if (stages.includes('FE')) {
              phaseRows += '| 3 | Forward Engineering | _After Phase 2_ | ⏳ Pending |\n';
            }
            if (stages.includes('TESTING')) {
              phaseRows += '| 4 | Testing | _After Phase 3_ | ⏳ Pending |\n';
            }

            // ── Post tracking comment on parent issue ──
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentIssue,
              body: '## 🚀 Pipeline Started — Phased Execution\n\n' +
                'The pipeline runs in phases. Each phase creates a PR. When merged, the next phase starts automatically.\n\n' +
                '| Phase | Scope | Issue | Status |\n' +
                '|-------|-------|-------|--------|\n' +
                phaseRows
            });

            // ── Label parent as running ──
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentIssue,
              labels: ['pipeline-running']
            });
